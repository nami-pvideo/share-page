<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分享合集 · 入口</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    header { text-align: center; margin-bottom: 48px; }
    header h1 { font-size: 2rem; font-weight: 700; color: #f8fafc; margin-bottom: 12px; }
    header p { font-size: 1rem; color: #94a3b8; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 960px;
      width: 100%;
    }
    .card {
      display: block;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 28px;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.5);
      background: rgba(56, 189, 248, 0.08);
    }
    .card .icon { font-size: 2rem; margin-bottom: 16px; }
    .card h2 { font-size: 1.15rem; font-weight: 600; color: #f1f5f9; margin-bottom: 10px; line-height: 1.4; }
    .card p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; }
    .card .sharer { margin-top: 16px; font-size: 0.85rem; color: #cbd5e1; }
    .card .sharer span { color: #38bdf8; font-weight: 600; }
    .card .arrow { margin-top: 12px; font-size: 0.85rem; color: #38bdf8; font-weight: 500; }
    footer { margin-top: 48px; font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>
  <header>
    <h1>纳米P视频团队 分享合集</h1>
    <p>选择下方任一主题进入查看</p>
  </header>

  <main class="cards"></main>

  <footer>© 2026 · 入口导航</footer>
  <script src="index.js"></script>
</body>
</html>
